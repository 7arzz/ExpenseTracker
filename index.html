<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Expense Tracker — Kelola pemasukan dan pengeluaranmu dengan mudah." />
    <title>Expense Tracker | 7arzz</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <!-- App Styles -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-wrapper">
      <!-- Header -->
      <header class="app-header">
        <h1><i class="fa-solid fa-wallet"></i> Expense Tracker</h1>
        <p>Kelola keuanganmu dengan mudah</p>
      </header>

      <!-- Stats Dashboard -->
      <div class="stats-grid">
        <div class="stat-card income">
          <div class="stat-icon"><i class="fa-solid fa-arrow-trend-up"></i></div>
          <div class="stat-label">Pemasukan</div>
          <div class="stat-value" id="totalIncome">Rp 0</div>
        </div>
        <div class="stat-card expense">
          <div class="stat-icon"><i class="fa-solid fa-arrow-trend-down"></i></div>
          <div class="stat-label">Pengeluaran</div>
          <div class="stat-value" id="totalExpense">Rp 0</div>
        </div>
        <div class="stat-card balance">
          <div class="stat-icon"><i class="fa-solid fa-scale-balanced"></i></div>
          <div class="stat-label">Saldo</div>
          <div class="stat-value" id="totalBalance">Rp 0</div>
        </div>
      </div>

      <!-- Form Card -->
      <div class="glass-card">
        <div class="section-title">
          <i class="fa-solid fa-plus-circle"></i>
          <span id="formTitle">Tambah Transaksi</span>
        </div>
        <form id="form">
          <div class="form-row">
            <div class="form-group">
              <label for="tanggal">Tanggal</label>
              <input type="date" id="tanggal" required />
            </div>
            <div class="form-group">
              <label for="tipe">Tipe</label>
              <select id="tipe">
                <option value="pemasukan">Pemasukan</option>
                <option value="pengeluaran">Pengeluaran</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="kategori">Kategori</label>
              <input type="text" id="kategori" placeholder="Contoh: Makan" required />
            </div>
            <div class="form-group">
              <label for="nominal">Nominal</label>
              <input type="number" id="nominal" placeholder="50000" min="1" required />
            </div>
          </div>

          <div class="form-group">
            <label for="keterangan">Keterangan</label>
            <input type="text" id="keterangan" placeholder="Opsional" />
          </div>

          <button type="submit" class="btn-submit" id="btnSubmit">
            <i class="fa-solid fa-floppy-disk"></i>&nbsp; Simpan
          </button>
        </form>
      </div>

      <!-- Transaction List Card -->
      <div class="glass-card">
        <div class="section-title">
          <i class="fa-solid fa-clock-rotate-left"></i>
          Riwayat Transaksi
        </div>

        <!-- Search -->
        <div class="search-wrapper">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input type="text" class="search-input" id="searchInput" placeholder="Cari kategori atau keterangan..." />
        </div>

        <!-- Filters -->
        <div class="filter-bar">
          <button class="filter-btn active" data-filter="semua">Semua</button>
          <button class="filter-btn" data-filter="pemasukan">
            <i class="fa-solid fa-arrow-up"></i>&nbsp; Pemasukan
          </button>
          <button class="filter-btn" data-filter="pengeluaran">
            <i class="fa-solid fa-arrow-down"></i>&nbsp; Pengeluaran
          </button>
        </div>

        <!-- List -->
        <ul id="list" class="transaction-list"></ul>
      </div>

      <!-- Footer -->
      <footer class="app-footer">
        &copy; 2026 Expense Tracker by 7arzz
      </footer>
    </div>

    <!-- Delete Confirm Modal -->
    <div class="modal-overlay" id="confirmModal">
      <div class="modal-box">
        <h3><i class="fa-solid fa-triangle-exclamation" style="color:var(--accent-red)"></i>&nbsp; Hapus Transaksi?</h3>
        <p>Data yang dihapus tidak bisa dikembalikan.</p>
        <div class="modal-actions">
          <button class="btn-cancel" id="btnCancelDelete">Batal</button>
          <button class="btn-confirm-delete" id="btnConfirmDelete">Hapus</button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
