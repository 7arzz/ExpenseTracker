<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense Tracker | 7arzz</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-light">
    <div class="container py-5 mt-5 justify-content-center align-items-center">
      <div class="row justify-content-center">
        <div class="col-md-5">
          <div class="card shadow-sm p-4">
            <h2 class="text-center mb-4">Expense Tracker</h2>

            <form id="form">
              <div class="mb-3">
                <label for="tanggal" class="form-label">Tanggal</label>
                <input type="date" id="tanggal" class="form-control" required />
              </div>

              <div class="mb-3">
                <label class="form-label">Tipe</label>
                <select id="tipe" class="form-select">
                  <option value="pemasukan">Pemasukan</option>
                  <option value="pengeluaran">Pengeluaran</option>
                </select>
              </div>

              <div class="mb-3">
                <label class="form-label">Kategori</label>
                <input
                  type="text"
                  id="kategori"
                  class="form-control"
                  placeholder="Kategori"
                  required
                />
              </div>

              <div class="mb-3">
                <label class="form-label">Nominal</label>
                <input
                  type="number"
                  id="nominal"
                  class="form-control"
                  placeholder="Nominal"
                  required
                />
              </div>

              <div class="mb-3">
                <label class="form-label">Keterangan</label>
                <input
                  type="text"
                  id="keterangan"
                  class="form-control"
                  placeholder="Opsional"
                />
              </div>

              <button type="submit" class="btn btn-custom w-100 mb-3">
                Simpan
              </button>

              <h5 class="text-center" id="saldo">
                Total Saldo: <span id="saldo">Rp 0</span>
              </h5>
            </form>

            <ul id="list" class="list-group mt-3"></ul>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
